<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>角色測試</title>
    <style>
        body {
            margin: 0;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: sans-serif;
            color: #ecf0f1;
        }

        .container {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        #preview {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 6px;
        }

        .preview-cell {
            width: 100px;
            height: 100px;
            background: #16213e;
            border: 2px solid #34495e;
            border-radius: 6px;
        }

        .right {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        canvas#main {
            background: #16213e;
            border: 2px solid #3498db;
            border-radius: 8px;
        }

        #info {
            margin-top: 15px;
            font-size: 18px;
        }

        kbd {
            background: #34495e;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 16px;
        }

        #debug {
            margin-top: 10px;
            color: #f39c12;
            font-size: 14px;
        }

        .formula-box { background: #16213e; border: 2px solid #34495e; border-radius: 8px; margin-bottom: 10px; }
        .formula-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; cursor: pointer; }
        .formula-header:hover { background: rgba(255,255,255,0.05); }
        .formula-title { color: #f39c12; font-size: 13px; font-weight: bold; margin: 0; }
        .formula-toggle { color: #95a5a6; font-size: 11px; }
        .formula-content { padding: 0 12px 12px 12px; display: block; }
        .formula-box.collapsed .formula-content { display: none; }
        .formula-box.collapsed .formula-toggle::after { content: '展開'; }
        .formula-box:not(.collapsed) .formula-toggle::after { content: '收合'; }
        .formula { color: #ecf0f1; font-size: 12px; line-height: 1.6; }
        .armor-color-btn {
            width: 36px;
            height: 36px;
            border: 2px solid #5d6d7e;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
            font-size: 11px;
            font-weight: bold;
        }
        .armor-color-btn:hover { transform: scale(1.1); }
        .armor-color-btn.selected { border-color: #f1c40f; box-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }
    </style>
</head>

<body>
    <div class="container">
        <div id="preview">
            <div></div>
            <canvas id="p-up" width="100" height="100"></canvas>
            <div></div>
            <canvas id="p-left" width="100" height="100"></canvas>
            <canvas id="p-default" width="100" height="100"></canvas>
            <canvas id="p-right" width="100" height="100"></canvas>
            <div></div>
            <canvas id="p-down" width="100" height="100"></canvas>
            <div></div>
        </div>
        <div class="right">
            <div class="formula-box collapsed" style="max-width: 350px; width: 100%; margin-bottom: 10px;">
                <div class="formula-header" onclick="this.parentElement.classList.toggle('collapsed')">
                    <div class="formula-title">等級影響</div>
                    <div class="formula-toggle"></div>
                </div>
                <div class="formula-content">
                    <div class="formula">
                        玩家等級：<input type="number" id="level-input" value="1" min="1" max="100" style="width: 50px; padding: 3px; border-radius: 4px; border: 1px solid #3498db; background: #0d1117; color: white; font-size: 12px;"><br><br>
                        <span style="color:#2ecc71;">玩家 HP</span>：<span id="f-player-hp-base">100</span> + (Lv-1) × <span id="f-player-hp-growth">20</span> = <span id="f-player-hp">100</span><br>
                        <span style="color:#2ecc71;">玩家攻擊</span>：<span id="f-player-dmg-base">1</span> + (Lv-1) × <span id="f-player-dmg-growth">1</span> = <span id="f-player-dmg">1</span><br>
                        <span style="color:#f39c12;">怪物 HP 倍率</span>：1 + (Lv-1) × 0.8 = <span id="f-enemy-hp">1.0</span>x<br>
                        <span style="color:#e74c3c;">怪物傷害倍率</span>：1 + (Lv-1) × 0.3 = <span id="f-enemy-dmg">1.0</span>x<br>
                        <span style="color:#5dade2;">玩家</span>：速度:<span id="f-player-speed">200</span> | 攻擊範圍:<span id="f-player-range">300</span> | 拾取:<span id="f-player-pickup">80</span>
                    </div>
                </div>
            </div>
            <div class="formula-box collapsed" style="max-width: 350px; width: 100%; margin-bottom: 10px;">
                <div class="formula-header" onclick="this.parentElement.classList.toggle('collapsed')">
                    <div class="formula-title">盔甲顏色</div>
                    <div class="formula-toggle"></div>
                </div>
                <div class="formula-content">
                    <div id="armor-color-options" style="display: flex; gap: 8px; justify-content: center;">
                        <button class="armor-color-btn selected" data-color="default" style="background: linear-gradient(135deg, #78909c, #546e7a);">灰</button>
                        <button class="armor-color-btn" data-color="gold" style="background: linear-gradient(135deg, #f1c40f, #f39c12);">金</button>
                        <button class="armor-color-btn" data-color="blue" style="background: linear-gradient(135deg, #3498db, #2980b9);">藍</button>
                        <button class="armor-color-btn" data-color="red" style="background: linear-gradient(135deg, #e74c3c, #c0392b);">紅</button>
                        <button class="armor-color-btn" data-color="pink" style="background: linear-gradient(135deg, #e91e63, #c2185b);">粉</button>
                    </div>
                </div>
            </div>
            <canvas id="main" width="300" height="300"></canvas>
            <div id="info">按 <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 旋轉，<kbd>Space</kbd> 攻擊</div>
            <div id="debug"></div>
            <div style="margin-top: 15px;"><a href="index.html" style="color: #5dade2; font-size: 14px;">← 返回首頁</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { PlayerRenderer } from './js/playerRenderer.js';
        import { loadConfig, buildDirToAngle } from './js/configLoader.js';

        const renderer = new PlayerRenderer();
        const debug = document.getElementById('debug');
        const canvas = document.getElementById('main');
        const ctx = canvas.getContext('2d');

        let DIR_TO_ANGLE = new Map();
        let defaultAngle = 0;

        const dirMap = {
            '0,-1': { id: 'p-up', label: '↑上' },
            '-1,0': { id: 'p-left', label: '←左' },
            '0,1': { id: 'p-down', label: '↓下' },
            '1,0': { id: 'p-right', label: '→右' }
        };

        let previews = [];

        function buildPreviews() {
            previews = [
                { id: 'p-default', angle: defaultAngle, label: `預設 ${Math.round(defaultAngle * 180 / Math.PI)}°` },
                ...Object.entries(dirMap).map(([key, info]) => ({
                    id: info.id,
                    angle: DIR_TO_ANGLE.get(key) ?? 0,
                    label: `${info.label} ${Math.round((DIR_TO_ANGLE.get(key) ?? 0) * 180 / Math.PI)}°`
                }))
            ];
            previews.forEach(drawPreview);
        }

        // 從 JSON 載入角度設定
        loadConfig('./config/angles.json').then(config => {
            DIR_TO_ANGLE = buildDirToAngle(config.directions);
            defaultAngle = config.defaultAngle * Math.PI / 180;
            buildPreviews();
        });

        // 從 JSON 載入玩家設定
        let playerConfig = { base: {}, growth: {} };
        loadConfig('./config/player.json').then(config => {
            playerConfig = config;
            document.getElementById('f-player-hp-base').textContent = config.base.maxHp;
            document.getElementById('f-player-hp-growth').textContent = config.growth.hpPerLevel;
            document.getElementById('f-player-dmg-base').textContent = config.base.damage;
            document.getElementById('f-player-dmg-growth').textContent = config.growth.damagePerLevel;
            document.getElementById('f-player-speed').textContent = config.base.speed;
            document.getElementById('f-player-range').textContent = config.base.attackRange;
            document.getElementById('f-player-pickup').textContent = config.base.pickupRange;
            updateLevelStats();
        });

        // 等級影響公式
        const levelInput = document.getElementById('level-input');
        const fPlayerHp = document.getElementById('f-player-hp');
        const fPlayerDmg = document.getElementById('f-player-dmg');
        const fEnemyHp = document.getElementById('f-enemy-hp');
        const fEnemyDmg = document.getElementById('f-enemy-dmg');

        function updateLevelStats() {
            const level = parseInt(levelInput.value) || 1;
            const base = playerConfig.base;
            const growth = playerConfig.growth;
            const playerHp = base.maxHp + (level - 1) * growth.hpPerLevel;
            const playerDmg = base.damage + (level - 1) * growth.damagePerLevel;
            const enemyHpMult = 1 + (level - 1) * 0.8;
            const enemyDmgMult = 1 + (level - 1) * 0.3;
            fPlayerHp.textContent = playerHp;
            fPlayerDmg.textContent = playerDmg;
            fEnemyHp.textContent = enemyHpMult.toFixed(1);
            fEnemyDmg.textContent = enemyDmgMult.toFixed(1);
        }

        levelInput.addEventListener('input', updateLevelStats);
        updateLevelStats();

        // 盔甲顏色設定
        const armorColorBtns = document.querySelectorAll('.armor-color-btn');
        armorColorBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                armorColorBtns.forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                renderer.setArmorColor(btn.dataset.color);
                // 重繪所有預覽
                previews.forEach(drawPreview);
            });
        });

        const core = {
            x: 150, y: 150, radius: 20,
            facingAngle: 0, flashTime: 0, magnetTimer: 0,
            baseAttackRange: 300, attackRange: 300
        };

        const combat = {
            attackAnimationTime: 0, attackDuration: 0.15, attackAngle: 0
        };

        function drawPreview(preview) {
            const cvs = document.getElementById(preview.id);
            if (!cvs) return;
            const pCtx = cvs.getContext('2d');
            pCtx.clearRect(0, 0, 100, 100);
            const pCore = {
                x: 50, y: 50, radius: 12,
                facingAngle: preview.angle, flashTime: 0, magnetTimer: 0,
                baseAttackRange: 0, attackRange: 0
            };
            renderer.draw(pCtx, pCore, { attackAnimationTime: 0, attackDuration: 0.15, attackAngle: 0 });
            pCtx.font = '12px sans-serif';
            pCtx.fillStyle = '#7f8c8d';
            pCtx.textAlign = 'center';
            pCtx.fillText(preview.label, 50, 96);
        }

        previews.forEach(drawPreview);

        const keys = {};
        window.addEventListener('keydown', e => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
                keys[e.key] = true;
                e.preventDefault();
            }
        });
        window.addEventListener('keyup', e => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
                keys[e.key] = false;
            }
        });

        function loop() {
            let dx = 0, dy = 0;
            if (keys['ArrowUp']) dy = -1;
            if (keys['ArrowDown']) dy = 1;
            if (keys['ArrowLeft']) dx = -1;
            if (keys['ArrowRight']) dx = 1;

            const key = `${dx},${dy}`;
            core.facingAngle = DIR_TO_ANGLE.get(key) ?? defaultAngle;

            if (combat.attackAnimationTime > 0) combat.attackAnimationTime -= 1 / 60;
            if (keys[' ']) combat.attackAnimationTime = combat.attackDuration;

            ctx.clearRect(0, 0, 300, 300);

            ctx.strokeStyle = 'rgba(255,255,255,0.08)';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(150, 0); ctx.lineTo(150, 300); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, 150); ctx.lineTo(300, 150); ctx.stroke();

            renderer.draw(ctx, core, combat);

            const dirLabel = dx > 0 ? '→右' : dx < 0 ? '←左' : dy < 0 ? '↑上' : dy > 0 ? '↓下' : '停(↓下)';
            debug.textContent = `方向: ${dirLabel}`;

            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>

</html>
